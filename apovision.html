<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHOTOAUTOMAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --main: #00ffcc;
      --accent: #ff9900;
      --red: #ff0055;
      --bg: #050505;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--main);
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      text-align: center;
    }

    .scanlines {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: repeating-radial-gradient(circle, rgba(0,0,0,0.4) 1px, transparent 1px, transparent 4px);
      background-size: 4px 4px;
      z-index: 200; pointer-events: none;
    }
    .crt-overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(18,16,16,0) 40%, rgba(0,0,0,0.5) 100%);
      z-index: 201; pointer-events: none;
    }

    .back-btn {
      position: fixed;
      top: 20px; left: 20px;
      padding: 8px 16px;
      border: 1px solid var(--main);
      background: transparent;
      color: var(--main);
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      cursor: pointer;
      text-decoration: none;
      z-index: 150;
      transition: 0.3s;
    }
    .back-btn:hover { background: var(--main); color: #000; }

    .page-title {
      margin-top: 60px;
      font-size: 28px;
      color: var(--accent);
      text-shadow: 3px 3px 0px var(--red);
      letter-spacing: 4px;
    }
    .subtitle {
      margin-top: 15px;
      font-size: 9px;
      color: rgba(0,255,204,0.5);
      letter-spacing: 2px;
      line-height: 1.8;
    }

    .upload-zone {
      margin-top: 35px;
      width: 320px;
      height: 220px;
      border: 2px dashed var(--main);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
      z-index: 50;
      background: rgba(0,255,204,0.02);
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(255,153,0,0.05);
      box-shadow: 0 0 30px rgba(255,153,0,0.1);
    }
    .upload-zone.has-image { border-style: solid; border-color: var(--accent); }
    .upload-icon { font-size: 40px; margin-bottom: 15px; }
    .upload-text { font-size: 8px; color: var(--main); letter-spacing: 1px; }
    .upload-hint { font-size: 6px; color: rgba(0,255,204,0.3); margin-top: 8px; }
    #file-input { display: none; }
    .preview-img { max-width: 100%; max-height: 100%; display: none; }

    .glitch-btn {
      margin-top: 25px;
      padding: 14px 35px;
      border: 2px solid var(--red);
      background: rgba(255,0,85,0.08);
      color: var(--red);
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: 0.3s;
      display: none;
      z-index: 50;
      position: relative;
    }
    .glitch-btn:hover {
      background: var(--red); color: #fff;
      box-shadow: 0 0 25px rgba(255,0,85,0.4);
    }
    .glitch-btn.visible { display: inline-block; }

    .result-area {
      margin-top: 30px;
      display: none;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 600px;
      padding-bottom: 60px;
    }
    .result-area.visible { display: flex; }

    .result-frame {
      background: #e8e4e0;
      padding: 60px 80px;
      border-radius: 4px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .result-canvas-wrap {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.2);
      position: relative;
    }
    #result-canvas { display: block; max-width: 100%; border-radius: 12px; }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .download-btn, .re-glitch-btn {
      padding: 10px 22px;
      border: 1px solid var(--main);
      background: transparent;
      color: var(--main);
      font-family: 'Press Start 2P', cursive;
      font-size: 7px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
      letter-spacing: 1px;
    }
    .re-glitch-btn { border-color: var(--red); color: var(--red); }
    .download-btn:hover { background: var(--main); color: #000; }
    .re-glitch-btn:hover { background: var(--red); color: #fff; }

    .loading {
      display: none;
      margin-top: 30px;
      font-size: 8px;
      color: var(--red);
      animation: blink 0.5s infinite;
    }
    .loading.visible { display: block; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    @media (max-width: 768px) {
      .page-title { font-size: 18px; margin-top: 50px; }
      .subtitle { font-size: 7px; padding: 0 20px; }
      .upload-zone { width: 85vw; max-width: 320px; height: 180px; }
      .back-btn { top: 12px; left: 12px; font-size: 7px; padding: 6px 12px; }
      .glitch-btn { font-size: 8px; padding: 12px 25px; }
      .result-frame { padding: 40px 50px; }
    }
  </style>
</head>
<body>

<div class="scanlines"></div>
<div class="crt-overlay"></div>
<a href="index.html" class="back-btn">&lt; BACK</a>

<h1 class="page-title">PHOTOAUTOMAT</h1>
<p class="subtitle">ESTHETICS FOR ALL</p>

<div class="upload-zone" id="upload-zone">
  <div class="upload-icon"></div>
  <div class="upload-text">DROP YOUR PHOTO HERE</div>
  <div class="upload-hint">or click to select</div>
  <img class="preview-img" id="preview-img">
</div>
<input type="file" id="file-input" accept="image/*">

<button class="glitch-btn" id="glitch-btn">PHOTOAUTOMAT</button>
<div class="loading" id="loading">DEVELOPING FILM...</div>

<div class="result-area" id="result-area">
  <div class="result-frame">
    <div class="result-canvas-wrap">
      <canvas id="result-canvas"></canvas>
    </div>
  </div>
  <div class="btn-row">
    <button class="re-glitch-btn" onclick="applyEffect()">RE-SHOOT</button>
    <a class="download-btn" id="download-btn" download="apo-vision.png">DOWNLOAD</a>
  </div>
</div>

<script>
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const previewImg = document.getElementById('preview-img');
const glitchBtn = document.getElementById('glitch-btn');
const loading = document.getElementById('loading');
const resultArea = document.getElementById('result-area');
const resultCanvas = document.getElementById('result-canvas');
const downloadBtn = document.getElementById('download-btn');
const ctx = resultCanvas.getContext('2d');

let originalImage = null;

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});
fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      previewImg.src = e.target.result;
      previewImg.style.display = 'block';
      uploadZone.querySelector('.upload-icon').style.display = 'none';
      uploadZone.querySelector('.upload-text').style.display = 'none';
      uploadZone.querySelector('.upload-hint').style.display = 'none';
      uploadZone.classList.add('has-image');
      glitchBtn.classList.add('visible');
      resultArea.classList.remove('visible');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

glitchBtn.addEventListener('click', () => {
  if (!originalImage) return;
  loading.classList.add('visible');
  glitchBtn.style.display = 'none';
  setTimeout(() => {
    applyEffect();
    loading.classList.remove('visible');
    resultArea.classList.add('visible');
    glitchBtn.classList.add('visible');
    glitchBtn.style.display = '';
  }, 1500);
});

function applyEffect() {
  if (!originalImage) return;
  const img = originalImage;

  // Küçük dikdörtgen kart (örnek görseldeki gibi kompakt)
  const cardW = Math.min(380, img.width);
  const cardH = Math.round(cardW * 0.58);
  const w = cardW, h = cardH;

  resultCanvas.width = w;
  resultCanvas.height = h;
  resultCanvas.style.borderRadius = '14px';

  // Arka plan
  ctx.fillStyle = '#1a0a0a';
  ctx.fillRect(0, 0, w, h);

  // Rounded corners clip
  const r = 14;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(w - r, 0);
  ctx.quadraticCurveTo(w, 0, w, r);
  ctx.lineTo(w, h - r);
  ctx.quadraticCurveTo(w, h, w - r, h);
  ctx.lineTo(r, h);
  ctx.quadraticCurveTo(0, h, 0, h - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.clip();

  // Fotoğrafı zoom crop (yüze yakınlaş — üst-orta kısmı al)
  const zoomFactor = 1.8 + Math.random() * 0.4;
  const srcW = img.width / zoomFactor;
  const srcH = img.height / zoomFactor;
  const sx = (img.width - srcW) / 2;
  const sy = (img.height - srcH) * 0.3; // Yüze doğru yukarı kaydır
  ctx.drawImage(img, sx, sy, srcW, srcH, 0, 0, w, h);

  let imgData = ctx.getImageData(0, 0, w, h);
  let d = imgData.data;
  const cx = w / 2, cy = h / 2;

  // ===== 1. PEMBE/KIRMIZI RENK TONLAMA =====
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];

    // Hafif kontrast artışı
    r = ((r - 128) * 1.15) + 128;
    g = ((g - 128) * 1.1) + 128;
    b = ((b - 128) * 1.05) + 128;

    // Pembe/kırmızı shift — kırmızı ve pembe kanalları yükselt
    r = r * 1.25 + 30;
    g = g * 0.85 + 10;
    b = b * 0.88 + 20;

    // Washed out / overexposed hissi
    r = r * 0.85 + 255 * 0.15;
    g = g * 0.85 + 200 * 0.15;
    b = b * 0.85 + 195 * 0.15;

    d[i]   = Math.max(0, Math.min(255, r));
    d[i+1] = Math.max(0, Math.min(255, g));
    d[i+2] = Math.max(0, Math.min(255, b));
  }

  // ===== 2. MERKEZ IŞIK PATLAMASI (light leak) =====
  const leakCx = cx + (Math.random() - 0.5) * w * 0.15;
  const leakCy = cy + (Math.random() - 0.5) * h * 0.15;
  const leakRadius = Math.max(w, h) * 0.55;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const dist = Math.sqrt((x - leakCx) ** 2 + (y - leakCy) ** 2);
      const norm = dist / leakRadius;
      if (norm < 1) {
        const intensity = Math.pow(1 - norm, 2.5) * 0.7;
        const i = (y * w + x) * 4;
        // Beyaz-pembe ışık patlaması
        d[i]   = Math.min(255, d[i]   + intensity * 255);
        d[i+1] = Math.min(255, d[i+1] + intensity * 220);
        d[i+2] = Math.min(255, d[i+2] + intensity * 210);
      }
    }
  }

  // ===== 3. İNCE FİLM ÇİZİKLERİ (scratch overlay) =====
  ctx.putImageData(imgData, 0, 0);

  // Dikey çizikler
  const numScratches = 15 + Math.floor(Math.random() * 20);
  for (let s = 0; s < numScratches; s++) {
    const sx = Math.random() * w;
    const sLen = h * (0.3 + Math.random() * 0.7);
    const sStart = Math.random() * (h - sLen);
    const opacity = 0.08 + Math.random() * 0.15;
    const thickness = 0.5 + Math.random() * 1;

    ctx.beginPath();
    ctx.moveTo(sx, sStart);
    // Hafif eğrilik
    const drift = (Math.random() - 0.5) * 15;
    ctx.quadraticCurveTo(sx + drift, sStart + sLen / 2, sx + drift * 0.5, sStart + sLen);
    ctx.strokeStyle = `rgba(255, 240, 230, ${opacity})`;
    ctx.lineWidth = thickness;
    ctx.stroke();
  }

  // Kısa çapraz çizikler
  const shortScratches = 8 + Math.floor(Math.random() * 12);
  for (let s = 0; s < shortScratches; s++) {
    const sx = Math.random() * w;
    const sy = Math.random() * h;
    const angle = Math.random() * Math.PI;
    const len = 20 + Math.random() * 60;
    const opacity = 0.05 + Math.random() * 0.12;

    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(angle) * len, sy + Math.sin(angle) * len);
    ctx.strokeStyle = `rgba(255, 240, 230, ${opacity})`;
    ctx.lineWidth = 0.3 + Math.random() * 0.7;
    ctx.stroke();
  }

  // ===== 4. HAFİF GRAIN =====
  imgData = ctx.getImageData(0, 0, w, h);
  d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const grain = (Math.random() - 0.5) * 18;
    d[i]   = Math.max(0, Math.min(255, d[i] + grain));
    d[i+1] = Math.max(0, Math.min(255, d[i+1] + grain));
    d[i+2] = Math.max(0, Math.min(255, d[i+2] + grain));
  }

  // ===== 5. KENAR KARARTMA (vignette — pembe tonlu) =====
  const maxDist = Math.sqrt(cx * cx + cy * cy);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
      const norm = dist / maxDist;
      const factor = 1 - Math.pow(norm, 1.6) * 0.45;
      const i = (y * w + x) * 4;
      d[i]   = Math.min(255, d[i] * factor + (1 - factor) * 40);
      d[i+1] *= factor;
      d[i+2] *= factor;
    }
  }

  ctx.putImageData(imgData, 0, 0);

  // ===== 6. İNCE PEMBE KENAR ÇİZGİSİ =====
  ctx.strokeStyle = 'rgba(255, 130, 130, 0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const rr = 13;
  ctx.moveTo(rr, 0.5);
  ctx.lineTo(w - rr, 0.5);
  ctx.quadraticCurveTo(w - 0.5, 0.5, w - 0.5, rr);
  ctx.lineTo(w - 0.5, h - rr);
  ctx.quadraticCurveTo(w - 0.5, h - 0.5, w - rr, h - 0.5);
  ctx.lineTo(rr, h - 0.5);
  ctx.quadraticCurveTo(0.5, h - 0.5, 0.5, h - rr);
  ctx.lineTo(0.5, rr);
  ctx.quadraticCurveTo(0.5, 0.5, rr, 0.5);
  ctx.closePath();
  ctx.stroke();

  ctx.restore();

  downloadBtn.href = resultCanvas.toDataURL('image/png');
}
</script>
</body>
</html>
